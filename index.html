<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PayCommit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c18;
  --card:#0f1628;
  --card2:#141c32;
  --border:#1e2845;
  --accent:#4f6ef7;
  --accent2:#7c6fff;
  --green:#00d4a0;
  --danger:#ff4d6d;
  --warn:#f59e0b;
  --text:#f0f4ff;
  --text2:#7b88b8;
  --muted:#2a3558;
  --r:20px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* LOGIN */
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999;background-image:radial-gradient(ellipse at 50% 0%,rgba(79,110,247,0.15) 0%,transparent 60%)}
.login-box{width:360px;max-width:92vw;text-align:center}
.login-logo{font-size:2.2rem;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
.login-logo .p{color:var(--accent)}
.login-logo .c{color:var(--green)}
.login-tagline{color:var(--text2);font-size:0.88rem;margin-bottom:40px;line-height:1.6}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;text-align:right}
.login-card h3{font-size:0.95rem;font-weight:700;margin-bottom:16px}
.inp{background:var(--card2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:12px 14px;font-size:0.9rem;outline:none;width:100%;font-family:inherit;transition:border .2s;margin-bottom:12px}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.btn-main{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:10px}
.btn-main:hover{background:#3d5ce0;transform:translateY(-1px)}
.btn-ghost{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--text2);font-size:0.88rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-ghost:hover{border-color:var(--accent2);color:var(--text)}

/* APP SHELL */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:24px 12px;flex-shrink:0}
.s-logo{font-size:1.1rem;font-weight:900;letter-spacing:-0.5px;padding:0 10px;margin-bottom:32px}
.s-logo .p{color:var(--accent)}
.s-logo .c{color:var(--green)}
.s-nav{display:flex;flex-direction:column;gap:2px}
.s-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--text2);font-size:0.85rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;width:100%;text-align:right}
.s-btn:hover{background:var(--card2);color:var(--text)}
.s-btn.active{background:rgba(79,110,247,0.15);color:var(--accent);font-weight:600}
.s-btn .icon{font-size:1rem;width:20px;text-align:center}
.s-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.s-user{display:flex;align-items:center;gap:10px}
.s-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0}
.s-name{font-size:0.78rem;color:var(--text2);font-weight:500}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:1.3rem;font-weight:800;letter-spacing:-0.5px}
.topbar p{font-size:0.8rem;color:var(--text2);margin-top:2px}
.content{padding:20px 24px 24px;flex:1}

/* PAGES */
.page{display:none;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SUMMARY CARD */
.summary{background:linear-gradient(135deg,#1a2550,#0f1628);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.summary::before{content:'';position:absolute;top:-40px;left:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(79,110,247,0.15),transparent 70%)}
.summary-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:8px}
.summary-amount{font-size:2.8rem;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:16px}
.summary-amount span{color:var(--accent)}
.summary-stats{display:flex;gap:20px;flex-wrap:wrap}
.ss{display:flex;flex-direction:column;gap:2px}
.ss-val{font-size:1.1rem;font-weight:800}
.ss-label{font-size:0.68rem;color:var(--text2);font-weight:500}

/* COMMITMENT CARDS */
.cards-list{display:flex;flex-direction:column;gap:12px}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.c-card:hover{border-color:rgba(79,110,247,0.4);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.c-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--status-color,var(--border))}
.c-card[data-status="CREATED"]{--status-color:#4f6ef7}
.c-card[data-status="SIGNED"]{--status-color:#60a5fa}
.c-card[data-status="SENT"]{--status-color:#f59e0b}
.c-card[data-status="ACCEPTED"]{--status-color:#00d4a0}
.c-card[data-status="REDEEMED"]{--status-color:#4ade80}
.c-card[data-status="CANCELED"]{--status-color:#3a4060}
.c-card[data-status="REJECTED"]{--status-color:#ff4d6d}
.c-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.c-amount{font-size:1.5rem;font-weight:900;letter-spacing:-0.5px}
.c-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:0.68rem;font-weight:700}
.c-badge.CREATED{background:rgba(79,110,247,0.15);color:#7b9bff}
.c-badge.SIGNED{background:rgba(96,165,250,0.15);color:#60a5fa}
.c-badge.SENT{background:rgba(245,158,11,0.15);color:#fbbf24}
.c-badge.ACCEPTED{background:rgba(0,212,160,0.15);color:#00d4a0}
.c-badge.REDEEMED{background:rgba(74,222,128,0.15);color:#4ade80}
.c-badge.CANCELED{background:rgba(58,64,96,0.3);color:#6b7299}
.c-badge.REJECTED{background:rgba(255,77,109,0.15);color:#ff4d6d}
.c-parties{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:0.83rem}
.c-party{background:var(--card2);border-radius:8px;padding:4px 10px;font-weight:600;color:var(--text)}
.c-arrow{color:var(--text2);font-size:0.8rem}
.c-progress{margin-bottom:4px}
.c-progress-bar{height:3px;background:var(--muted);border-radius:2px;overflow:hidden}
.c-progress-fill{height:100%;border-radius:2px;background:var(--status-color,var(--accent));transition:width .5s ease}
.c-meta{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text2);margin-top:6px}

/* PROGRESS STEPS */
.steps{display:flex;align-items:center;gap:0;margin-bottom:4px}
.step{display:flex;align-items:center;gap:0;flex:1}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
.step-dot.done{background:var(--status-color,var(--accent));box-shadow:0 0 6px var(--status-color,var(--accent))}
.step-line{flex:1;height:2px;background:var(--muted);transition:all .3s}
.step-line.done{background:var(--status-color,var(--accent))}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:3rem;margin-bottom:16px;opacity:0.4}
.empty h3{font-size:1rem;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty p{font-size:0.83rem;color:var(--text2);opacity:0.7}

/* FORM PAGE */
.form-wrap{max-width:520px}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px}
.form-title{font-size:1rem;font-weight:700;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg label{font-size:0.72rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.fg input,.fg select{background:var(--card2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:0.88rem;outline:none;transition:all .2s;width:100%;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,0.15)}
.fg input::placeholder{color:var(--muted)}
.form-actions{margin-top:20px;display:flex;gap:10px}
.btn-submit{padding:12px 24px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:8px}
.btn-submit:hover{background:#3d5ce0;transform:translateY(-1px)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.open{opacity:1;pointer-events:all}
@media(min-width:769px){.mo{align-items:center}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:28px;width:100%;max-width:520px;transform:translateY(20px);transition:transform .3s cubic-bezier(.34,1.2,.64,1);max-height:90vh;overflow-y:auto}
@media(min-width:769px){.modal{border-radius:var(--r);max-width:480px}}
.mo.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;display:block}
@media(min-width:769px){.modal-handle{display:none}}
.modal h2{font-size:1rem;font-weight:800;margin-bottom:20px}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:16px}
.btn-sec{padding:9px 18px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text2);font-size:0.83rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-sec:hover{border-color:var(--accent2);color:var(--text)}
.btn-act{padding:9px 18px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:0.83rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-act:hover{background:#3d5ce0}

/* DETAIL */
.detail-amount{font-size:2.5rem;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.detail-parties{display:flex;align-items:center;gap:10px;margin-bottom:20px;font-size:0.88rem}
.detail-party{background:var(--card2);border-radius:10px;padding:6px 14px;font-weight:600}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.di{background:var(--card2);border-radius:12px;padding:12px 14px}
.di .dk{font-size:0.68rem;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.di .dv{font-size:0.85rem;font-weight:600;word-break:break-all}
.sig-wrap{background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:16px;border:1px solid rgba(0,212,160,0.2)}
.sig-label{font-size:0.68rem;color:var(--green);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sig-val{font-size:0.65rem;color:var(--text2);font-family:monospace;word-break:break-all;line-height:1.5}
.action-btns{display:flex;gap:8px;flex-wrap:wrap}
.act-btn{padding:10px 18px;border-radius:12px;border:none;font-size:0.83rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.act-btn.primary{background:var(--accent);color:#fff}
.act-btn.primary:hover{background:#3d5ce0}
.act-btn.danger{background:rgba(255,77,109,0.15);color:var(--danger);border:1px solid rgba(255,77,109,0.3)}
.act-btn.danger:hover{background:rgba(255,77,109,0.25)}

/* TIMELINE */
.tl{display:flex;flex-direction:column;gap:0}
.tli{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.tld{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;box-shadow:0 0 8px rgba(79,110,247,0.5)}
.tla{font-weight:600;font-size:0.83rem}
.tlm{font-size:0.72rem;color:var(--text2);margin-top:2px}

/* TOAST */
.toasts{position:fixed;bottom:24px;left:24px;display:flex;flex-direction:column;gap:8px;z-index:300}
.toast{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:0.83rem;font-weight:500;animation:slideIn .3s cubic-bezier(.34,1.56,.64,1);max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.s{border-color:rgba(0,212,160,0.4);color:var(--green)}
.toast.e{border-color:rgba(255,77,109,0.4);color:var(--danger)}
@keyframes slideIn{from{transform:translateX(-16px) scale(.95);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}

/* MOBILE NAV */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:50;padding:8px 0 12px;justify-content:space-around}
.mnb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 20px;cursor:pointer;color:var(--text2);font-size:0.65rem;font-weight:500;font-family:inherit;transition:color .2s}
.mnb .mi{font-size:1.3rem}
.mnb.active{color:var(--accent)}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(79,110,247,0.15);border-color:var(--accent);color:var(--accent)}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding-bottom:70px}
  .content{padding:16px}
  .topbar{padding:16px 16px 0}
  .mnav{display:flex}
  .summary-amount{font-size:2rem}
  .form-grid{grid-template-columns:1fr}
  .toasts{left:12px;right:12px;bottom:76px}
  .toast{max-width:100%}
  .detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="ls">
  <div class="login-box">
    <div class="login-logo"><span class="p">Pay</span><span class="c">Commit</span></div>
    <div class="login-tagline">התחייבות תשלום דיגיטלית<br/>חכמה, מאובטחת, מחייבת</div>
    <div class="login-card">
      <h3>כניסה למערכת</h3>
      <input class="inp" type="email" id="lemail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')quickLogin()"/>
      <button class="btn-main" onclick="quickLogin()">כניסה ←</button>
      <button class="btn-ghost" onclick="guestLogin()">כניסה כאורח</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="s-logo"><span class="p">Pay</span><span class="c">Commit</span></div>
    <div class="s-nav">
      <button class="s-btn active" onclick="nav('home',this)"><span class="icon">◈</span>הבית</button>
      <button class="s-btn" onclick="nav('create',this)"><span class="icon">✚</span>התחייבות חדשה</button>
      <button class="s-btn" onclick="nav('all',this)"><span class="icon">☰</span>כל ההתחייבויות</button>
    </div>
    <div class="s-footer">
      <div class="s-user">
        <div class="s-avatar" id="s-av">?</div>
        <div class="s-name" id="s-name">PayCommit</div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar" id="topbar">
      <div><h1 id="page-title">הבית</h1><p id="page-sub">סקירה כללית</p></div>
      <button class="btn-submit" onclick="nav('create',null)" style="padding:9px 16px;font-size:0.8rem">✚ חדש</button>
    </div>
    <div class="content">

      <!-- HOME -->
      <div class="page active" id="page-home">
        <div class="summary" id="summary-card">
          <div class="summary-label">סה"כ התחייבויות פעילות</div>
          <div class="summary-amount">₪<span id="total-amount">0</span></div>
          <div class="summary-stats">
            <div class="ss"><div class="ss-val" id="s-total" style="color:var(--accent)">0</div><div class="ss-label">סה"כ</div></div>
            <div class="ss"><div class="ss-val" id="s-pending" style="color:var(--warn)">0</div><div class="ss-label">ממתינות</div></div>
            <div class="ss"><div class="ss-val" id="s-done" style="color:var(--green)">0</div><div class="ss-label">מומשו</div></div>
            <div class="ss"><div class="ss-val" id="s-canceled" style="color:var(--text2)">0</div><div class="ss-label">בוטלו</div></div>
          </div>
        </div>
        <div class="filter-bar">
          <button class="filter-btn active" onclick="filterCards('all',this)">הכל</button>
          <button class="filter-btn" onclick="filterCards('active',this)">פעילות</button>
          <button class="filter-btn" onclick="filterCards('REDEEMED',this)">מומשו</button>
          <button class="filter-btn" onclick="filterCards('CANCELED',this)">בוטלו</button>
        </div>
        <div class="cards-list" id="cards-list">
          <div class="empty"><div class="empty-icon">📋</div><h3>אין התחייבויות עדיין</h3><p>לחץ על "חדש" כדי ליצור את הראשונה</p></div>
        </div>
      </div>

      <!-- CREATE -->
      <div class="page" id="page-create">
        <div class="form-wrap">
          <div class="form-card">
            <div class="form-title">✚ התחייבות חדשה</div>
            <div class="form-grid">
              <div class="fg"><label>סכום (₪)</label><input type="number" id="f-amount" placeholder="1,500"/></div>
              <div class="fg"><label>תאריך פירעון</label><input type="date" id="f-due"/></div>
              <div class="fg"><label>יוצר</label><input type="text" id="f-creator" placeholder="user_a"/></div>
              <div class="fg"><label>נמען</label><input type="text" id="f-recipient" placeholder="user_b"/></div>
              <div class="fg full"><label>תיאור</label><input type="text" id="f-desc" placeholder="שכר דירה אוגוסט 2025"/></div>
            </div>
            <div class="form-actions">
              <button class="btn-submit" onclick="createC()">✚ צור התחייבות</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ALL -->
      <div class="page" id="page-all">
        <div class="filter-bar">
          <button class="filter-btn active" onclick="filterAll('all',this)">הכל</button>
          <button class="filter-btn" onclick="filterAll('CREATED',this)">CREATED</button>
          <button class="filter-btn" onclick="filterAll('SIGNED',this)">SIGNED</button>
          <button class="filter-btn" onclick="filterAll('SENT',this)">SENT</button>
          <button class="filter-btn" onclick="filterAll('ACCEPTED',this)">ACCEPTED</button>
          <button class="filter-btn" onclick="filterAll('REDEEMED',this)">REDEEMED</button>
        </div>
        <div class="cards-list" id="all-list"></div>
      </div>

    </div>
  </div>

  <!-- MOBILE NAV -->
  <nav class="mnav" id="mnav">
    <button class="mnb active" onclick="nav('home',this,true)"><span class="mi">◈</span>הבית</button>
    <button class="mnb" onclick="nav('create',this,true)"><span class="mi">✚</span>חדש</button>
    <button class="mnb" onclick="nav('all',this,true)"><span class="mi">☰</span>הכל</button>
  </nav>
</div>

<!-- DETAIL MODAL -->
<div class="mo" id="mo-detail">
  <div class="modal">
    <span class="modal-handle"></span>
    <div id="detail-content"></div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeMo('mo-detail')">סגור</button>
      <button class="btn-act" onclick="loadAudit(currentId)">📜 היסטוריה</button>
    </div>
  </div>
</div>

<!-- AUDIT MODAL -->
<div class="mo" id="mo-audit">
  <div class="modal">
    <span class="modal-handle"></span>
    <h2>Audit Trail</h2>
    <div class="tl" id="audit-tl"></div>
    <div class="modal-actions"><button class="btn-sec" onclick="closeMo('mo-audit')">סגור</button></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API='';
let currentId=null,allData=[],currentFilter='all';

const STATUS_PROGRESS={'CREATED':1,'SIGNED':2,'SENT':3,'ACCEPTED':4,'REDEEMED':5,'CANCELED':0,'REJECTED':0};
const STATUS_STEPS=['CREATED','SIGNED','SENT','ACCEPTED','REDEEMED'];

function nav(name,btn,mobile=false){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.s-btn,.mnb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  const titles={home:['הבית','סקירה כללית'],create:['התחייבות חדשה','מלא את הפרטים'],all:['כל ההתחייבויות','חפש ונהל']};
  const t=titles[name]||['',''];
  document.getElementById('page-title').textContent=t[0];
  document.getElementById('page-sub').textContent=t[1];
  if(name==='home')loadHome();
  if(name==='all')loadAll();
}

async function apiFetch(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  const data=await res.json();
  if(!res.ok)throw new Error(data.detail||'שגיאה');
  return data;
}

function toast(msg,type='s'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// LOAD HOME
async function loadHome(){
  try{
    allData=await apiFetch('GET','/commitments');
    const active=allData.filter(c=>!['CANCELED','REJECTED','REDEEMED'].includes(c.status));
    const totalAmt=active.reduce((s,c)=>s+c.amount,0);
    document.getElementById('total-amount').textContent=totalAmt.toLocaleString();
    document.getElementById('s-total').textContent=allData.length;
    document.getElementById('s-pending').textContent=allData.filter(c=>['SENT','ACCEPTED'].includes(c.status)).length;
    document.getElementById('s-done').textContent=allData.filter(c=>c.status==='REDEEMED').length;
    document.getElementById('s-canceled').textContent=allData.filter(c=>['CANCELED','REJECTED'].includes(c.status)).length;
    renderCards('cards-list',allData.slice().reverse(),currentFilter);
  }catch(e){toast(e.message,'e')}
}

async function loadAll(){
  try{
    allData=await apiFetch('GET','/commitments');
    renderCards('all-list',allData.slice().reverse(),'all');
  }catch(e){toast(e.message,'e')}
}

function filterCards(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-bar .filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderCards('cards-list',allData.slice().reverse(),f);
}

function filterAll(f,btn){
  document.querySelectorAll('#page-all .filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderCards('all-list',allData.slice().reverse(),f);
}

function renderCards(containerId,data,filter){
  const el=document.getElementById(containerId);
  let filtered=data;
  if(filter==='active')filtered=data.filter(c=>!['CANCELED','REJECTED','REDEEMED'].includes(c.status));
  else if(filter!=='all')filtered=data.filter(c=>c.status===filter);
  if(!filtered.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><h3>אין התחייבויות</h3><p>לחץ על "חדש" כדי ליצור</p></div>';
    return;
  }
  el.innerHTML=filtered.map(c=>buildCard(c)).join('');
}

function buildCard(c){
  const prog=STATUS_PROGRESS[c.status]||0;
  const pct=c.status==='CANCELED'||c.status==='REJECTED'?0:Math.round((prog/5)*100);
  const steps=STATUS_STEPS.map((s,i)=>{
    const done=prog>i;
    const last=i===STATUS_STEPS.length-1;
    return`<div class="step"><div class="step-dot ${done?'done':''}"></div>${!last?`<div class="step-line ${done?'done':''}"></div>`:''}</div>`;
  }).join('');
  return`<div class="c-card" data-status="${c.status}" onclick="openDetail('${c.id}')">
    <div class="c-top">
      <div class="c-amount">₪${c.amount.toLocaleString()}</div>
      <span class="c-badge ${c.status}">${c.status}</span>
    </div>
    <div class="c-parties">
      <span class="c-party">${c.creator_id}</span>
      <span class="c-arrow">←</span>
      <span class="c-party">${c.recipient_id}</span>
    </div>
    <div class="steps">${steps}</div>
    <div class="c-meta">
      <span>${c.description||'ללא תיאור'}</span>
      <span>פירעון: ${c.due_date}</span>
    </div>
  </div>`;
}

async function createC(){
  const amount=parseFloat(document.getElementById('f-amount').value);
  const due_date=document.getElementById('f-due').value;
  const creator_id=document.getElementById('f-creator').value.trim();
  const recipient_id=document.getElementById('f-recipient').value.trim();
  const description=document.getElementById('f-desc').value.trim();
  if(!amount||!due_date||!creator_id||!recipient_id){toast('מלא את כל השדות','e');return}
  try{
    const c=await apiFetch('POST','/commitments',{amount,due_date,creator_id,recipient_id,description:description||null,currency:'ILS'});
    toast('✅ התחייבות נוצרה בהצלחה');
    ['f-amount','f-due','f-creator','f-recipient','f-desc'].forEach(i=>document.getElementById(i).value='');
    openDetail(c.id);
  }catch(e){toast(e.message,'e')}
}

async function openDetail(id){
  currentId=id;
  try{
    const c=await apiFetch('GET',`/commitments/${id}`);
    const acts=nextActs(c.status);
    document.getElementById('detail-content').innerHTML=`
      <div class="detail-amount">₪${c.amount.toLocaleString()}</div>
      <div class="detail-parties">
        <span class="detail-party">${c.creator_id}</span>
        <span style="color:var(--text2)">←</span>
        <span class="detail-party">${c.recipient_id}</span>
        <span class="c-badge ${c.status}" style="margin-right:auto">${c.status}</span>
      </div>
      <div class="detail-grid">
        <div class="di"><div class="dk">תאריך פירעון</div><div class="dv">${c.due_date}</div></div>
        <div class="di"><div class="dk">מטבע</div><div class="dv">${c.currency}</div></div>
        <div class="di"><div class="dk">תיאור</div><div class="dv">${c.description||'—'}</div></div>
        <div class="di"><div class="dk">עודכן</div><div class="dv">${new Date(c.updated_at).toLocaleDateString('he-IL')}</div></div>
      </div>
      ${c.signature?`<div class="sig-wrap"><div class="sig-label">🔐 חתימה דיגיטלית מאומתת</div><div class="sig-val">${c.signature}</div></div>`:''}
      ${acts.length?`<div class="action-btns">${acts.map(a=>`<button class="act-btn ${a.d?'danger':'primary'}" onclick="doAct('${id}','${a.k}','${c.creator_id}','${c.recipient_id}')">${a.l}</button>`).join('')}</div>`:''}
    `;
    openMo('mo-detail');
  }catch(e){toast(e.message,'e')}
}

function nextActs(s){
  return({
    CREATED:[{k:'sign',l:'✍️ חתום'},{k:'cancel',l:'בטל',d:true}],
    SIGNED:[{k:'send',l:'📤 שלח'},{k:'cancel',l:'בטל',d:true}],
    SENT:[{k:'accept',l:'✅ קבל'},{k:'reject',l:'דחה',d:true}],
    ACCEPTED:[{k:'redeem',l:'💰 מימש'},{k:'cancel',l:'בטל',d:true}],
  }[s]||[]);
}

async function doAct(id,action,cid,rid){
  const actor={sign:cid,send:cid,accept:rid,reject:rid,redeem:cid,cancel:cid}[action];
  try{
    await apiFetch('POST',`/commitments/${id}/${action}?actor_id=${actor}`);
    toast(`✅ ${action.toUpperCase()} בוצע`);
    closeMo('mo-detail');
    loadHome();
  }catch(e){toast(e.message,'e')}
}

async function loadAudit(id){
  try{
    const logs=await apiFetch('GET',`/commitments/${id}/audit`);
    document.getElementById('audit-tl').innerHTML=logs.map(l=>`
      <div class="tli">
        <div class="tld"></div>
        <div>
          <div class="tla">${l.action} ${l.from_status?`${l.from_status} → ${l.to_status}`:`→ ${l.to_status}`}</div>
          <div class="tlm">${l.actor_id} · ${new Date(l.timestamp).toLocaleString('he-IL')}</div>
        </div>
      </div>`).join('')||'<div style="color:var(--text2);padding:16px">אין רשומות</div>';
    closeMo('mo-detail');
    openMo('mo-audit');
  }catch(e){toast(e.message,'e')}
}

function openMo(id){document.getElementById(id).classList.add('open')}
function closeMo(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

function quickLogin(){
  const email=document.getElementById('lemail').value.trim();
  if(!email){toast('הזן מייל','e');return}
  enterApp(email);
}
function guestLogin(){enterApp('אורח')}
function enterApp(label){
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('mnav').style.display='flex';
  document.getElementById('s-name').textContent=label;
  document.getElementById('s-av').textContent=label[0].toUpperCase();
  loadHome();
  toast(`ברוך הבא 👋`);
}
</script>
</body>
</html>
