<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PayCommit — Pitch Deck</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;
  --s1:#0c0f1e;
  --s2:#111628;
  --s3:#171d35;
  --border:#1e2540;
  --accent:#7c6fff;
  --green:#00d4a0;
  --text:#f0f2ff;
  --muted:#6b7299;
  --text2:#a8b0d0;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,8,15,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-logo{font-size:1.1rem;font-weight:800;color:var(--accent);letter-spacing:0.5px}
.nav-logo span{color:var(--green)}
.nav-dots{display:flex;gap:8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .3s}
.nav-dot.active{background:var(--accent);transform:scale(1.3)}

/* SLIDES */
.slide{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:100px 60px 60px;position:relative;overflow:hidden}
.slide-num{position:absolute;top:80px;left:48px;font-size:0.7rem;color:var(--muted);letter-spacing:3px;font-weight:600}

/* BG EFFECTS */
.glow-purple{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,255,0.08) 0%,transparent 70%);pointer-events:none}
.glow-green{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,160,0.06) 0%,transparent 70%);pointer-events:none}

/* TYPOGRAPHY */
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(124,111,255,0.1);color:#9d94ff;border:1px solid rgba(124,111,255,0.2);border-radius:100px;padding:6px 16px;font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px}
h1{font-size:clamp(2.5rem,6vw,5rem);font-weight:900;line-height:1.05;letter-spacing:-2px}
h2{font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-1px;margin-bottom:16px}
h3{font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)}
p{color:var(--text2);line-height:1.7;font-size:0.95rem}
.accent{color:var(--accent)}
.green{color:var(--green)}
.divider{width:48px;height:3px;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;margin:24px auto}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:960px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;width:100%;max-width:960px}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;transition:border-color .3s,transform .3s}
.card:hover{border-color:rgba(124,111,255,0.3);transform:translateY(-3px)}
.card.glow{border-color:rgba(124,111,255,0.25);background:linear-gradient(135deg,var(--s1),rgba(124,111,255,0.04))}
.card-icon{font-size:2rem;margin-bottom:16px;display:block}

/* HERO */
.hero{text-align:center;background:radial-gradient(ellipse at 50% -20%,rgba(124,111,255,0.15) 0%,transparent 60%)}
.hero h1{margin-bottom:24px}
.hero-sub{font-size:1.1rem;color:var(--text2);max-width:560px;margin:0 auto 48px;line-height:1.7}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:8px 20px;font-size:0.82rem;color:var(--text2);margin-bottom:32px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}

/* FLOW */
.flow{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;width:100%;max-width:900px;margin:40px 0}
.flow-item{display:flex;align-items:center;gap:0}
.flow-step{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;text-align:center;min-width:110px;transition:all .3s}
.flow-step:hover{border-color:var(--accent);background:rgba(124,111,255,0.08)}
.flow-step .icon{font-size:1.6rem;display:block;margin-bottom:6px}
.flow-step .label{font-size:0.72rem;font-weight:700;color:var(--muted);letter-spacing:0.5px}
.flow-step.final{border-color:rgba(0,212,160,0.3);background:rgba(0,212,160,0.05)}
.flow-step.final .label{color:var(--green)}
.arrow{color:var(--border);font-size:1.4rem;padding:0 6px;flex-shrink:0}

/* TABLE */
.compare-table{width:100%;max-width:860px;border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.compare-table table{width:100%;border-collapse:collapse}
.compare-table th{background:var(--s2);padding:14px 20px;font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.compare-table th.hl{color:var(--green);background:rgba(0,212,160,0.05)}
.compare-table td{padding:14px 20px;border-top:1px solid var(--border);font-size:0.88rem;color:var(--text2);text-align:center}
.compare-table td:first-child{text-align:right;color:var(--text);font-weight:500}
.compare-table td.hl{background:rgba(0,212,160,0.03);color:var(--text)}
.compare-table tr:hover td{background:rgba(255,255,255,0.02)}

/* STAT */
.stat-num{font-size:3.5rem;font-weight:900;letter-spacing:-2px;line-height:1}
.stat-num.purple{color:var(--accent)}
.stat-num.teal{color:var(--green)}

/* TIMELINE */
.roadmap{display:flex;flex-direction:column;gap:0;width:100%;max-width:700px}
.rm-item{display:flex;gap:24px;padding:24px 0;border-bottom:1px solid var(--border);position:relative}
.rm-item:last-child{border-bottom:none}
.rm-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;box-shadow:0 0 12px rgba(124,111,255,0.5)}
.rm-dot.green{background:var(--green);box-shadow:0 0 12px rgba(0,212,160,0.5)}
.rm-dot.dim{background:var(--border);box-shadow:none}
.rm-phase{font-size:0.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.rm-title{font-size:1rem;font-weight:700;margin-bottom:6px}

/* CTA */
.cta-slide{background:radial-gradient(ellipse at 50% 100%,rgba(0,212,160,0.08) 0%,transparent 60%);text-align:center}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:40px}
.btn-main{background:var(--accent);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;box-shadow:0 0 30px rgba(124,111,255,0.3)}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(124,111,255,0.5)}
.btn-outline{background:none;color:var(--text);border:1px solid var(--border);padding:14px 32px;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

/* MOBILE */
@media(max-width:768px){
  nav{padding:14px 20px}
  .slide{padding:80px 24px 40px}
  .slide-num{left:24px}
  h1{font-size:2.2rem;letter-spacing:-1px}
  h2{font-size:1.6rem}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .flow{gap:8px}
  .flow-item{flex-direction:column}
  .arrow{transform:rotate(90deg)}
  .compare-table{overflow-x:auto}
  .cta-btns{flex-direction:column;align-items:center}
}
</style>
</head>

slides.forEach((_,i)=>{
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i===0?' active':'');
  d.onclick = ()=>document.getElementById('s'+i).scrollIntoView({behavior:'smooth'});
  dotsEl.appendChild(d);
});

// ACTIVE DOT ON SCROLL
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const i = e.target.id.replace('s','');
      document.querySelectorAll('.nav-dot').forEach((d,j)=>d.classList.toggle('active',j==i));
    }
  });
},{threshold:0.5});
slides.forEach((_,i)=>observer.observe(document.getElementById('s'+i)));
</script>
</body>
</html>
