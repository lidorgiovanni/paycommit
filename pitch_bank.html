<html lang="he" dir="rtl">

<meta charset="UTF-8"/>

<title>PayCommit — Banking Pitch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;
  --s1:#0c0f1e;
  --s2:#111628;
  --border:#1e2540;
  --accent:#7c6fff;
  --green:#00d4a0;
  --gold:#f5c842;
  --text:#f0f2ff;
  --muted:#6b7299;
  --text2:#a8b0d0;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,8,15,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-logo{font-size:1.1rem;font-weight:800;color:var(--accent);letter-spacing:0.5px}
.nav-logo span{color:var(--gold)}
.nav-dots{display:flex;gap:8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .3s}
.nav-dot.active{background:var(--gold);transform:scale(1.3)}
.slide{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:100px 60px 60px;position:relative;overflow:hidden}
.slide-num{position:absolute;top:80px;left:48px;font-size:0.7rem;color:var(--muted);letter-spacing:3px;font-weight:600}
.glow-purple{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,255,0.08) 0%,transparent 70%);pointer-events:none}
.glow-gold{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(245,200,66,0.06) 0%,transparent 70%);pointer-events:none}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(245,200,66,0.08);color:#f5c842;border:1px solid rgba(245,200,66,0.2);border-radius:100px;padding:6px 16px;font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px}
h1{font-size:clamp(2.5rem,6vw,5rem);font-weight:900;line-height:1.05;letter-spacing:-2px}
h2{font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-1px;margin-bottom:16px}
h3{font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)}
p{color:var(--text2);line-height:1.7;font-size:0.95rem}
.accent{color:var(--accent)}
.gold{color:var(--gold)}
.green{color:var(--green)}
.divider{width:48px;height:3px;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:2px;margin:24px auto}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:960px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;width:100%;max-width:960px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;transition:border-color .3s,transform .3s}
.card:hover{border-color:rgba(245,200,66,0.3);transform:translateY(-3px)}
.card.glow{border-color:rgba(245,200,66,0.15);background:linear-gradient(135deg,var(--s1),rgba(245,200,66,0.03))}
.card-icon{font-size:2rem;margin-bottom:16px;display:block}
.hero{text-align:center;background:radial-gradient(ellipse at 50% -20%,rgba(245,200,66,0.1) 0%,transparent 60%)}
.hero h1{margin-bottom:24px}
.hero-sub{font-size:1.1rem;color:var(--text2);max-width:580px;margin:0 auto 48px;line-height:1.7}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:8px 20px;font-size:0.82rem;color:var(--text2);margin-bottom:32px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
/* FLOW */
.flow{display:flex;align-items:flex-start;justify-content:center;gap:0;flex-wrap:wrap;width:100%;max-width:1000px;margin:40px 0}
.flow-item{display:flex;align-items:center;gap:0}
.flow-step{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;text-align:center;min-width:120px;transition:all .3s;position:relative}
.flow-step:hover{border-color:var(--gold);background:rgba(245,200,66,0.05)}
.flow-step .icon{font-size:1.6rem;display:block;margin-bottom:6px}
.flow-step .label{font-size:0.7rem;font-weight:700;color:var(--muted);letter-spacing:0.5px;display:block}
.flow-step .sub{font-size:0.65rem;color:var(--muted);margin-top:4px;display:block}
.flow-step.bank{border-color:rgba(0,212,160,0.3);background:rgba(0,212,160,0.05)}
.flow-step.bank .label{color:var(--green)}
.arrow{color:var(--border);font-size:1.4rem;padding:0 4px;flex-shrink:0;margin-top:24px}
/* KEY CONCEPT BOX */
.key-box{background:linear-gradient(135deg,rgba(245,200,66,0.08),rgba(0,212,160,0.05));border:1px solid rgba(245,200,66,0.25);border-radius:20px;padding:32px 40px;text-align:center;max-width:700px;margin:32px 0}
.key-box h3{font-size:1.3rem;margin-bottom:12px;color:var(--gold)}
/* STAT */
.stat-num{font-size:3.5rem;font-weight:900;letter-spacing:-2px;line-height:1}
.stat-num.gold{color:var(--gold)}
.stat-num.teal{color:var(--green)}
/* CTA */
.cta-slide{background:radial-gradient(ellipse at 50% 100%,rgba(245,200,66,0.07) 0%,transparent 60%);text-align:center}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:40px}
.btn-main{background:var(--gold);color:#06080f;border:none;padding:14px 32px;border-radius:12px;font-size:0.9rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .3s;box-shadow:0 0 30px rgba(245,200,66,0.2)}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(245,200,66,0.4)}
.btn-outline{background:none;color:var(--text);border:1px solid var(--border);padding:14px 32px;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
@media(max-width:768px){
  nav{padding:14px 20px}
  .slide{padding:80px 24px 40px}
  .slide-num{left:24px}
  h1{font-size:2.2rem;letter-spacing:-1px}
  h2{font-size:1.6rem}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .flow{gap:8px}
  .flow-item{flex-direction:column}
  .arrow{transform:rotate(90deg);margin-top:0}
  .cta-btns{flex-direction:column;align-items:center}
}
</style>

document.getElementById('deck').innerHTML = slides.join('');

const dotsEl = document.getElementById('nav-dots');
slides.forEach((_,i)=>{
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i===0?' active':'');
  d.onclick = ()=>document.getElementById('s'+i).scrollIntoView({behavior:'smooth'});
  dotsEl.appendChild(d);
});

const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const i = e.target.id.replace('s','');
      document.querySelectorAll('.nav-dot').forEach((d,j)=>d.classList.toggle('active',j==i));
    }
  });
},{threshold:0.5});
slides.forEach((_,i)=>observer.observe(document.getElementById('s'+i)));
